train_manifest: data/manifests/danbooru/train.jsonl
val_manifest: data/manifests/danbooru/val.jsonl
output_dir: runs/dinov3_lora

backbone_backend: hf-transformers
model_name: facebook/dinov3-vits16-pretrain-lvd1689m
pretrained: true
trust_remote_code: false
image_size: 224
image_mean: [0.485, 0.456, 0.406]
image_std: [0.229, 0.224, 0.225]
embedding_dim: 256
projection_hidden_dim: 512

finetune_mode: lora
lora_r: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target_modules: query,value,qkv

epochs: 10
identities_per_batch: 16
samples_per_identity: 4
lr: 0.0001
weight_decay: 0.0001
scheduler: cosine-warmup
min_lr: 0.000001
warmup_epochs: 1
step_size: 5
gamma: 0.1
milestones: null
temperature: 0.07
classification_weight: 0.1
workers: 8
device: auto
amp: true
seed: 523
