train_manifest: data/manifests/danbooru/train.jsonl
val_manifest: data/manifests/danbooru/val.jsonl
output_dir: runs/uni_full

backbone_backend: hf-timm
model_name: hf-hub:MahmoodLab/UNI
pretrained: true
trust_remote_code: false
timm_kwargs:
  init_values: 0.00001
  dynamic_img_size: true
image_size: 224
image_mean: [0.485, 0.456, 0.406]
image_std: [0.229, 0.224, 0.225]
embedding_dim: 256
projection_hidden_dim: 512

finetune_mode: full
epochs: 10
identities_per_batch: 8
samples_per_identity: 4
lr: 0.00002
weight_decay: 0.0001
scheduler: cosine-warmup
min_lr: 0.0000002
warmup_epochs: 1
step_size: 5
gamma: 0.1
milestones: null
temperature: 0.07
classification_weight: 0.1
workers: 8
device: auto
amp: true
seed: 523
